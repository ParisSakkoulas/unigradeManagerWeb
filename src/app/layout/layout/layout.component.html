<div class="min-h-screen flex bg-gray-50">

  <!-- Sidebar -->
  <aside
    class="shrink-0 bg-white border-r border-gray-200 flex flex-col transition-all duration-200 fixed inset-y-0 left-0 z-30 sm:relative"
    [ngClass]="sidebarOpen() ? 'w-56' : 'w-0 overflow-hidden sm:w-56'">
    <!-- Brand -->
    <div class="h-14 flex items-center px-5 border-b border-gray-200 shrink-0">
      <i class="pi pi-graduation-cap text-blue-600 mr-2" style="font-size:18px"></i>
      <span class="font-semibold text-gray-900 text-sm tracking-tight">Grade Manager</span>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 py-3 overflow-y-auto">
      <ng-container *ngFor="let item of visibleNav">
        <a [routerLink]="item.path" routerLinkActive="bg-blue-50 text-blue-700 font-medium"
          [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
          class="flex items-center gap-3 px-4 py-2.5 mx-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <i [class]="'pi ' + item.icon" style="font-size:16px;width:18px;text-align:center"></i>
          {{ item.label }}
        </a>
      </ng-container>
    </nav>

    <!-- Bottom: user info -->
    <div class="shrink-0 border-t border-gray-200 p-3">
      <a routerLink="/profile"
        class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer">
        <div
          class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-xs font-semibold shrink-0">
          {{ initials }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate">{{ auth.user()?.login }}</p>
          <p class="text-xs text-gray-400 truncate">{{ roleLabel }}</p>
        </div>
      </a>
    </div>
  </aside>

  <!-- Mobile backdrop -->
  <div *ngIf="sidebarOpen()" class="fixed inset-0 bg-black/30 z-20 sm:hidden" (click)="sidebarOpen.set(false)"></div>



  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0">



    <p-toolbar>
      <p-menu #menu [model]="visibleProfileMenu" [popup]="true" />
      <p-button (click)="menu.toggle($event)" icon="pi pi-ellipsis-v" />

    </p-toolbar>

    <!-- Click outside to close dropdown -->
    <!-- <div *ngIf="dropdownOpen()" class="fixed inset-0 z-40" (click)="dropdownOpen.set(false)"></div> -->

    <!-- Page content -->
    <main class="flex-1 p-6 overflow-auto">
      <router-outlet />
    </main>

  </div>
</div>
