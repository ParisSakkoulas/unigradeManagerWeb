<div class="max-w-xl mx-auto space-y-6">
  <div class="flex items-center gap-3">
    <a routerLink="/instructors" class="text-gray-400 hover:text-gray-600">
      <svg
        class="w-5 h-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </a>
    <h1 class="text-xl font-semibold text-gray-900">Instructor detail</h1>
  </div>

  <div *ngIf="loading" class="flex justify-center py-16">
    <app-spinner size="lg" />
  </div>

  <ng-container *ngIf="!loading && instructor">
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">
      <div class="flex items-start justify-between">
        <div>
          <h2 class="text-lg font-semibold">
            {{ instructor.firstName }} {{ instructor.lastName }}
          </h2>
          <p class="text-sm text-gray-500">{{ rankLabel }}</p>
        </div>
        <div *hasRole="[Role.ADMIN]" class="flex gap-2">
          <app-button
            size="sm"
            variant="secondary"
            [routerLink]="['/instructors', instructor._id, 'edit']"
            >Edit</app-button
          >
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <p class="text-sm font-semibold text-gray-700 mb-3">Teachings</p>
      <app-button
        variant="secondary"
        routerLink="/teachings"
        [queryParams]="{ instructorId: instructor._id }"
      >
        View all teachings
      </app-button>
    </div>
  </ng-container>
</div>
