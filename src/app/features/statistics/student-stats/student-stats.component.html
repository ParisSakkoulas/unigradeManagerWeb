<div class="space-y-6">
  <h1 class="text-xl font-semibold text-gray-900">My statistics</h1>

  <div *ngIf="loading" class="flex justify-center py-16">
    <app-spinner size="lg" />
  </div>

  <ng-container *ngIf="!loading && stats">
    <!-- Summary cards -->
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
      <app-stat-card
        label="Courses passed"
        [value]="stats.totalPassed"
        icon="✓"
        color="green"
        trend="up"
      />
      <app-stat-card
        label="Courses failed"
        [value]="stats.totalFailed"
        icon="✗"
        color="red"
        trend="down"
      />
      <app-stat-card
        label="Pass rate"
        [value]="totalRate"
        icon="%"
        color="blue"
      />
    </div>

    <!-- Pie chart -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 max-w-sm">
      <p class="text-sm font-semibold text-gray-700 mb-4">
        Overall pass / fail
      </p>
      <p-chart
        type="pie"
        [data]="pieData"
        [options]="pieOptions"
        height="220"
      />
    </div>
  </ng-container>
</div>
