<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-8"
  >
    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-semibold text-gray-900">Create account</h1>
      <p class="mt-1 text-sm text-gray-500">
        Your request will be reviewed by an admin
      </p>
    </div>

    <!-- Success state -->
    <div *ngIf="submitted" class="text-center flex flex-col gap-4">
      <div
        class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto"
      >
        <svg
          class="w-6 h-6 text-green-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          />
        </svg>
      </div>
      <p class="text-gray-700 font-medium">Registration request sent!</p>
      <p class="text-sm text-gray-500">
        An admin will approve your account. You can then sign in.
      </p>
      <a
        routerLink="/auth/login"
        class="text-blue-600 hover:underline text-sm font-medium"
      >
        Back to sign in
      </a>
    </div>

    <!-- Form -->
    <form
      *ngIf="!submitted"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex flex-col gap-5"
    >
      <app-input
        formControlName="login"
        label="Login"
        placeholder="Choose a login"
        [required]="true"
        [error]="fieldError('login')"
      />

      <app-input
        formControlName="password"
        label="Password"
        type="password"
        placeholder="At least 8 characters"
        [required]="true"
        [error]="fieldError('password')"
      />

      <!-- Role selector -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">
          Role <span class="text-red-500 ml-0.5">*</span>
        </label>
        <div class="flex gap-3">
          <label
            *ngFor="let opt of roleOptions"
            class="flex-1 flex items-center gap-2 border rounded-lg px-4 py-3 cursor-pointer transition-colors"
            [ngClass]="
              form.value.role === opt.value
                ? 'border-blue-500 bg-blue-50 text-blue-700'
                : 'border-gray-300 hover:bg-gray-50 text-gray-700'
            "
          >
            <input
              type="radio"
              formControlName="role"
              [value]="opt.value"
              class="sr-only"
            />
            <span class="text-sm font-medium">{{ opt.label }}</span>
          </label>
        </div>
        <p *ngIf="fieldError('role')" class="text-xs text-red-600">
          {{ fieldError("role") }}
        </p>
      </div>

      <!-- General error -->
      <p *ngIf="errorMsg" class="text-sm text-red-600 text-center">
        {{ errorMsg }}
      </p>

      <app-button
        type="submit"
        [loading]="loading"
        [fullWidth]="true"
        class="mt-1"
      >
        Request account
      </app-button>
    </form>

    <!-- Footer -->
    <p *ngIf="!submitted" class="mt-6 text-center text-sm text-gray-500">
      Already have an account?
      <a
        routerLink="/auth/login"
        class="text-blue-600 hover:underline font-medium"
      >
        Sign in
      </a>
    </p>
  </div>
</div>
