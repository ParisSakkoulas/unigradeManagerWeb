<div class="max-w-2xl mx-auto space-y-6">
  <!-- Back -->
  <div class="flex items-center gap-3">
    <a routerLink="/courses" class="text-gray-400 hover:text-gray-600">
      <svg
        class="w-5 h-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </a>
    <h1 class="text-xl font-semibold text-gray-900">Course detail</h1>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-16">
    <app-spinner size="lg" />
  </div>

  <ng-container *ngIf="!loading && course">
    <!-- Card -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
      <!-- Title row -->
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-xs text-gray-400 font-mono mb-1">{{ course.code }}</p>
          <h2 class="text-lg font-semibold text-gray-900">{{ course.name }}</h2>
        </div>
        <div *hasRole="[Role.ADMIN]" class="flex gap-2 shrink-0">
          <app-button
            size="sm"
            variant="secondary"
            [routerLink]="['/courses', course._id, 'edit']"
          >
            Edit
          </app-button>
          <app-button size="sm" variant="danger" (onClick)="showDelete = true">
            Delete
          </app-button>
        </div>
      </div>

      <!-- Description -->
      <div>
        <p class="text-xs font-medium text-gray-500 mb-1">Description</p>
        <p class="text-sm text-gray-700">
          {{ course.description || "No description provided." }}
        </p>
      </div>

      <!-- Prerequisites -->
      <div>
        <p class="text-xs font-medium text-gray-500 mb-2">Prerequisites</p>
        <div
          *ngIf="course.prerequisites.length === 0"
          class="text-sm text-gray-400"
        >
          None
        </div>
        <div class="flex flex-wrap gap-2">
          <a
            *ngFor="let prereq of course.prerequisites"
            [routerLink]="['/courses', prereq._id]"
            class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-50 text-blue-700 hover:bg-blue-100 transition-colors"
          >
            {{ prereq.code }} — {{ prereq.name }}
          </a>
        </div>
      </div>
    </div>

    <!-- Teachings section -->
    <div class="bg-white rounded-xl border border-gray-200 p-6">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">View teachings</h3>
      <app-button
        variant="secondary"
        [routerLink]="['/teachings']"
        [queryParams]="{ courseId: course._id }"
      >
        See all teachings for this course
      </app-button>
    </div>
  </ng-container>
</div>

<app-confirm-dialog
  [isOpen]="showDelete"
  title="Delete course"
  [message]="'Delete ' + (course?.name ?? '') + '? This cannot be undone.'"
  [loading]="deleting"
  (confirmed)="onDelete()"
  (cancelled)="showDelete = false"
/>
