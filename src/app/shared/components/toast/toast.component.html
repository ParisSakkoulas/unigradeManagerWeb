<div class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 w-80">
  <div
    *ngFor="let toast of toastService.toasts()"
    [ngClass]="toastClasses(toast.type)"
    class="flex items-start gap-3 rounded-lg px-4 py-3 shadow-lg text-sm animate-slide-in"
  >
    <!-- Icon -->
    <svg
      class="w-5 h-5 shrink-0 mt-0.5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        *ngIf="toast.type === 'success'"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M5 13l4 4L19 7"
      />
      <path
        *ngIf="toast.type === 'error'"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      />
      <path
        *ngIf="toast.type === 'warning'"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
      />
      <path
        *ngIf="toast.type === 'info'"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>

    <p class="flex-1">{{ toast.message }}</p>

    <button
      (click)="toastService.dismiss(toast.id)"
      class="shrink-0 opacity-60 hover:opacity-100 transition-opacity"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
</div>
